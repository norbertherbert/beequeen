name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Assemble Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^export const FW_VERSION = "\(.*\)";/\1/p' version.ts)"
          test -n "$VERSION"
          mkdir -p site/"$VERSION"
          cp -R dist/. site/"$VERSION"/
          cp public-dev/beequeen/versions.json site/versions.json
          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./$VERSION/" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>BeeQueen</title>
            </head>
            <body>
              <p>Redirecting to <a href="./$VERSION/">the latest BeeQueen build</a>...</p>
            </body>
          </html>
          EOF
          cp site/index.html site/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
